<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumos - Chat with your documents</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div>
                    <div class="logo">
                        <i data-lucide="sparkles" style="width: 28px; height: 28px;"></i>
                        <span style="margin-left: -4px;">Lumos</span>
                    </div>
                    <div style="font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; margin-left: 36px;">
                        AI Document Intelligence
                    </div>
                </div>
                
                <div class="search-box-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="doc-search-input" class="doc-search-input" placeholder="Search documents...">
                </div>

                <input type="file" id="file-upload" accept="application/pdf" style="display: none;">
                <button id="upload-btn" class="btn btn-primary w-full justify-center shadow-btn">
                    <i data-lucide="plus" id="upload-icon"></i>
                    New Document
                </button>
            </div>
            
            <div class="sidebar-section-title">YOUR DOCUMENTS</div>
            <div class="sidebar-content" id="document-list">
                <!-- Document Cards injected here via ui.js -->
            </div>
            
            <div class="sidebar-footer">
                <div class="storage-usage">
                    <i data-lucide="cloud" style="width: 14px; height: 14px;"></i>
                    <span>Storage: Healthy</span>
                </div>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-area">
            <header class="chat-header">
                <div class="flex items-center">
                    <button id="mobile-menu-btn" class="mobile-menu-btn">
                        <i data-lucide="menu"></i>
                    </button>
                    <div id="chat-header-content">
                        <!-- Dynamic Header injected here via ui.js -->
                    </div>
                </div>
            </header>
            
            <!-- Empty State -->
            <div id="chat-empty-state" class="empty-state">
                <div class="hero-group">
                    <div class="empty-state-icon">
                        <i data-lucide="book-open"></i>
                    </div>
                    <h1 class="hero-title">Chat with your documents.</h1>
                    <p class="hero-subtitle">Upload PDFs, search instantly, and get accurate answers with cited sources.</p>
                </div>
            </div>

            <!-- Chat History -->
            <div class="chat-container hidden" id="chat-history">
                <!-- Chat messages injected here via ui.js -->
            </div>
            
            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" class="input-text chat-input" placeholder="Ask a question about this document...">
                    <button id="chat-send-btn" class="chat-send-btn">
                        <i data-lucide="arrow-up" style="width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Application Logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
